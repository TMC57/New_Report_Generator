version: "3.8"

services:
  tmh-api:
    build: .
    container_name: tmh-container
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - DATA_ROOT=/app/data          # <-- Ton code lit cette variable
    volumes:
      - ../Reports:/app/data         # <-- Pont vers ton dossier Windows
      - ./uploads:/app/uploads
      - ./Config:/app/Config
